<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Evolución Histórica por Empleado</title>
<style>
  :root {
    color-scheme: dark;
    --gold: #d4af37;
    --gold-light: #f0d78a;
    --gold-deep: #c9a227;
    --ink: #f2ede1;
    --muted: #8a8371;
    --good: #34d399;
    --bad: #f87171;
  }
  * { box-sizing: border-box; }
  html { scrollbar-color: #3a3323 #0b0b0c; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #33301f; border-radius: 999px; border: 2px solid #0b0b0c; }
  ::-webkit-scrollbar-thumb:hover { background: #48412a; }

  body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1100px 520px at 50% -10%, rgba(212,175,55,.06), transparent 60%),
      #0b0b0c;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px 48px; }

  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 20px;
    border-bottom: 1px solid #211d15;
    background: linear-gradient(180deg, rgba(212,175,55,.05), transparent 70%);
    max-width: 1000px; margin: 0 auto;
    position: sticky; top: 0; z-index: 5;
    backdrop-filter: blur(6px);
  }
  .logo {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--gold-deep);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-weight: 700; font-size: 13px;
    flex-shrink: 0;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 4px rgba(212,175,55,.07), 0 4px 14px -4px rgba(0,0,0,.6);
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .topbar h1 { font-size: 18px; margin: 0; color: #f5f1e8; font-weight: 700; letter-spacing: -.01em; }
  .topbar .sub { font-size: 10.5px; color: #a9a08a; letter-spacing: .09em; text-transform: uppercase; margin-top: 3px; }

  .content { padding-top: 24px; }

  .card {
    background: linear-gradient(180deg, #17140f, #141109);
    border: 1px solid #2a2419;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 10px 28px -18px rgba(0,0,0,.7);
    animation: fadeInUp .28s ease both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }

  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: #121a14; border: 1px solid #234027;
    border-radius: 999px; padding: 8px 14px;
    font-size: 12.5px; color: #b9c9bc; margin-bottom: 14px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 6px var(--good); }

  .top-grid { display: grid; grid-template-columns: minmax(180px, 260px) 1fr; gap: 16px; align-items: stretch; }
  @media (max-width: 640px) { .top-grid { grid-template-columns: 1fr; } }
  .date-card { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .date-card .date-label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .date-card .date-value { font-size: 16px; font-weight: 700; color: var(--gold-light); text-transform: capitalize; }
  .date-card .date-time { font-size: 20px; font-weight: 700; color: #f5f1e8; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .date-card .date-location { font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: .03em; }
  .search-card { display: flex; flex-direction: column; justify-content: center; }

  .search-row { display: flex; gap: 8px; }
  input#searchBox {
    flex: 1;
    padding: 12px 15px;
    font-size: 14px;
    border: 1px solid #33301f;
    border-radius: 10px;
    outline: none;
    background: #0f0d0a;
    color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input#searchBox::placeholder { color: #6f6a5a; }
  input#searchBox:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,.15); }
  button {
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    background: linear-gradient(180deg, #e6c65c, #c9a227);
    color: #1a1608;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    box-shadow: 0 6px 16px -8px rgba(212,175,55,.55);
  }
  button:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 10px 20px -10px rgba(212,175,55,.6); }
  button:active { transform: translateY(0); filter: brightness(.98); }
  button.secondary {
    background: #1e1a12; color: #cfc7b0; border: 1px solid #33301f;
    box-shadow: none;
  }
  button.secondary:hover { border-color: var(--gold-deep); color: #f2ede1; box-shadow: 0 6px 14px -10px rgba(0,0,0,.6); }
  #cuentaToggleBtn { width: 100%; text-align: center; }
  #cuentaToggleBtn.active-filter { border-color: var(--gold); color: var(--gold-light); background: #2a2413; }

  .cuenta-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .01em; }
  .cuenta-badge.si { color: var(--good); background: rgba(52,211,153,.14); }
  .cuenta-badge.no { color: var(--bad); background: rgba(248,113,113,.14); }
  .cuenta-badge.unk { color: var(--muted); background: rgba(138,131,113,.12); }

  .meta-line { font-size: 11.5px; color: var(--muted); margin-top: 12px; letter-spacing: .02em; }

  select#hierarchySelect, select#provinceSelect, select.period-select {
    width: 100%;
    padding: 12px 15px;
    font-size: 14px;
    border: 1px solid #33301f;
    border-radius: 10px;
    outline: none;
    background: #0f0d0a;
    color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  select#hierarchySelect:focus, select#provinceSelect:focus, select.period-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,.15); }

  .period-row { display: flex; align-items: center; gap: 10px; }
  .period-row select.period-select { flex: 1; }
  .period-sep { color: var(--muted); font-size: 13px; flex-shrink: 0; }

  .back-btn { margin-bottom: 14px; }

  .month-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .month-pill {
    background: #1c1811;
    border: 1px solid #33301f;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    cursor: pointer;
    color: #cfc7b0;
    user-select: none;
    transition: border-color .12s ease, color .12s ease, background .12s ease;
  }
  .month-pill:hover { border-color: var(--gold); color: #f2ede1; }
  .month-pill.active { background: #2a2413; border-color: var(--gold); color: var(--gold-light); font-weight: 600; }

  .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip {
    background: #1c1811;
    border: 1px solid #33301f;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    color: #e7dfc9;
    transition: border-color .12s ease, color .12s ease, transform .12s ease;
  }
  .chip:hover { border-color: var(--gold); color: #f2ede1; transform: translateY(-1px); }

  .state { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
  .state.error { color: var(--bad); }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--gold-deep); margin: 0 0 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::before { content: ""; width: 14px; height: 1.5px; background: var(--gold-deep); display: inline-block; }

  .employee-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .employee-name { font-size: 18px; font-weight: 700; color: #f5f1e8; letter-spacing: -.01em; }
  .employee-code { font-size: 11.5px; color: var(--muted); letter-spacing: .03em; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-top: 16px; }
  .stat { background: #100d09; border: 1px solid #26221749; border-radius: 12px; padding: 14px 16px; transition: border-color .15s ease; }
  .stat .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 6px; color: #f5f1e8; }
  .stat .value.good { color: var(--good); }
  .stat .value.mid { color: var(--gold); }
  .stat .value.bad { color: var(--bad); }

  .month-cards { display: flex; flex-direction: column; gap: 10px; }
  .month-card {
    background: #100d09; border: 1px solid #26221749; border-radius: 12px; padding: 14px 16px;
  }
  .month-card .month-card-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .month-card .month-name { font-size: 15px; font-weight: 700; color: var(--gold-light); }
  .month-card .month-count { font-size: 11.5px; color: var(--muted); }
  .month-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px,1fr)); gap: 10px; text-align: left; }
  .month-metrics .m-value { font-size: 18px; font-weight: 700; }
  .month-metrics .m-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 4px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1e1a12; white-space: nowrap; color: #d9d2bf; }
  th {
    background: linear-gradient(180deg, #131009, #100d09);
    color: var(--muted); font-weight: 700; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .05em; position: sticky; top: 0;
    border-bottom: 1px solid #2a2419;
  }
  tbody tr { transition: background .1s ease; }
  tbody tr:nth-child(even) td { background: rgba(255,255,255,.012); }
  tr:hover td { background: #1a160f; }
  .table-scroll { overflow-x: auto; border-radius: 12px; border: 1px solid #26221749; }
  table { margin-top: 0; }

  .member-row { cursor: pointer; }
  .member-row:hover td { background: #1e1a12; }

  .score-good { color: var(--good); font-weight: 700; }
  .score-mid { color: var(--gold); font-weight: 700; }
  .score-bad { color: var(--bad); font-weight: 700; }

  .cell-alert { background: rgba(248,113,113,.16); color: #fecaca; font-weight: 700; box-shadow: inset 2px 0 0 rgba(248,113,113,.5); }

  .alert-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .alert-chip {
    background: #100d09; border: 1px solid #26221749; border-radius: 10px;
    padding: 7px 13px; min-width: 62px; text-align: center;
    cursor: help;
    transition: border-color .15s ease, transform .1s ease;
  }
  .alert-chip:hover { transform: translateY(-1px); }
  .alert-chip .av { font-size: 15px; font-weight: 700; color: #f5f1e8; }
  .alert-chip .al { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
  .alert-chip.bad { border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.05); }
  .alert-chip.bad .av { color: var(--bad); }

  .tipbox {
    position: fixed; z-index: 9999; display: none;
    max-width: 320px; max-height: 260px; overflow-y: auto;
    background: #14110a; border: 1px solid rgba(212,175,55,.35);
    border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    font-size: 12px; line-height: 1.5; color: #e8e2d0;
    pointer-events: none;

  .tipbox .tip-title { font-weight: 700; color: var(--gold-light); margin-bottom: 6px; font-size: 12.5px; }
  .tipbox .tip-section { margin-bottom: 6px; }
  .tipbox .tip-section:last-child { margin-bottom: 0; }
  .tipbox .tip-section .tip-label { font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: .04em; margin-bottom: 2px; }
  .tipbox .tip-section.good .tip-label { color: var(--good); }
  .tipbox .tip-section.bad .tip-label { color: var(--bad); }
  .tipbox .tip-section.muted .tip-label { color: var(--muted); }
  .tipbox .tip-names { color: #cfc9b8; }

  .hint { font-size: 12px; color: #6f6a5a; margin-top: 8px; }

  .month-title { font-size: 14px; font-weight: 700; color: var(--gold-light); }
  .month-sub { font-size: 11.5px; color: var(--muted); margin-bottom: 10px; }
  .month-section { border-left: 2px solid var(--gold-deep); }
</style>
</head>

// "#VALUE!" a "Si Cuenta"/"No cuenta" (o cambia de estado) se refleje solo.
// Si falla (sin permisos, sin red, etc.) se mantiene la foto de respaldo
// embebida arriba y la app sigue funcionando igual.
async function fetchCuentaEData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${CUADRANTE_FILE_ID}/gviz/tq?tqx=out:json&gid=${CUADRANTE_GID}&headers=1&_ts=${Date.now()}`;
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const { cols, rows } = parseGviz(text);
    const idxMatricula = cols.findIndex(c => normalize(c) === "matricula");
    const idxTecnico = cols.findIndex(c => normalize(c) === "tecnico");
    const idxCuentaE = cols.findIndex(c => normalize(c) === "cuenta e");
    if (idxMatricula === -1 || idxTecnico === -1 || idxCuentaE === -1) return;

    const byMatricula = {};
    const byName = {};
    rows.forEach(r => {
      const mat = (r[idxMatricula] || "").toString().trim();
      const name = (r[idxTecnico] || "").toString().trim();
      const raw = (r[idxCuentaE] || "").toString().trim().toLowerCase();
      let val = null;
      if (raw === "si cuenta") val = "Si";
      else if (raw === "no cuenta") val = "No";
      if (mat) byMatricula[mat] = val;
      if (name) byName[name] = val;
    });

    // Solo reemplazamos si de verdad trajimos datos, para no borrar la foto
    // de respaldo con una respuesta vacía o incompleta.
    if (Object.keys(byMatricula).length > 0) {
      CUENTA_E_BY_MATRICULA = byMatricula;
      CUENTA_E_BY_NAME = byName;
      // Si ya hay un grupo abierto en pantalla, lo refrescamos con el dato fresco.
      if (currentGroup) updateGroupStats();
    }
  } catch (e) {
    // Sin conexión con el Cuadrante: seguimos con la foto de respaldo.
  }
}

/* ---------- helpers ---------- */

function normalize(s) {
  return (s || "").toString().normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
}

function findHeader(pred) {
  return headers.find(pred);
}

function parseNum(s) {
  if (s === null || s === undefined || s === "") return NaN;
  const cleaned = String(s).replace(/[€%\s]/g, "").replace(",", ".");
  return parseFloat(cleaned);
}

function parseFecha(s) {
  const m = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec((s || "").trim());
  if (!m) return null;
  return new Date(+m[3], +m[2] - 1, +m[1]);
}

function isBad(v, threshold, orEqual) {
  const n = parseNum(v);
  if (isNaN(n)) return false;
  return orEqual ? n <= threshold : n < threshold;
}

function cleanTecnico(v) {
  return (v || "").replace(/^\[merged\]\s*/i, "").trim();
}

/* ---------- fetch each month tab from Google's public Visualization API ---------- */

function parseGviz(text) {
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Respuesta inesperada de Google Sheets.");
  const json = JSON.parse(text.slice(start, end + 1));
  if (json.status === "error") {
    const msg = (json.errors && json.errors[0] && (json.errors[0].detailed_message || json.errors[0].message)) || "Error de Google Sheets.";
    throw new Error(msg);
  }
  const cols = json.table.cols.map(c => (c.label || "").trim());
  const rows = json.table.rows.map(r => cols.map((_, i) => {
    const cell = r.c ? r.c[i] : null;
    if (!cell) return "";
    if (cell.f !== undefined && cell.f !== null) return cell.f;
    if (cell.v === undefined || cell.v === null) return "";
    return String(cell.v);
  }));
  return { cols, rows };
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchSheetOnce(name) {
  // Google cachea agresivamente esta URL. Agregamos un parámetro con la hora
  // actual para forzar siempre una respuesta fresca del Sheet.
  const url = `https://docs.google.com/spreadsheets/d/${FILE_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1&_ts=${Date.now()}`;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  return parseGviz(text);
}

function buildSheetResult(name, cols, rows) {
  // Algunas pestañas tienen la celda de encabezado de la columna de fecha en
  // blanco (en vez de decir literalmente "Fecha"), aunque la columna sí
  // contiene fechas. Si no lo encontramos por texto, lo detectamos buscando
  // qué columna tiene valores con formato DD/MM/AAAA.
  if (!cols.some(c => normalize(c) === "fecha")) {
    const dateRegex = /^\d{1,2}\/\d{1,2}\/\d{4}$/;
    let dateColIdx = -1;
    for (let ci = 0; ci < cols.length; ci++) {
      const hits = rows.slice(0, 15).filter(r => dateRegex.test((r[ci] || "").trim())).length;
      if (hits > 0) { dateColIdx = ci; break; }
    }
    if (dateColIdx !== -1) {
      cols = cols.slice();
      cols[dateColIdx] = "Fecha";
    }
  }

  if (!cols.some(c => normalize(c) === "fecha")) return null;
  if (!cols.some(c => normalize(c) === "tecnico")) return null;

  const finalHeaders = [];
  cols.forEach(c => {
    let h = c || "Col";
    if (finalHeaders.includes(h)) h = h + " (2)";
    finalHeaders.push(h);
  });

  const parsedRows = rows
    .filter(r => r.some(v => v !== ""))
    .map(r => {
      const obj = {};
      finalHeaders.forEach((h, i) => { obj[h] = r[i] !== undefined ? r[i] : ""; });
      obj.__sheet = name;
      return obj;
    });

  // Huella de la primera fila cruda (sin el nombre de mes) para poder
  // detectar más adelante si Google nos devolvió, por error, los mismos
  // datos de otra pestaña.
  const fingerprint = rows.length ? rows[0].join("|") : "";

  return { name, headers: finalHeaders, rows: parsedRows, fingerprint, rawCount: rows.length };
}

async function fetchSheetAttempt(name) {
  let parsed;
  try {
    parsed = await fetchSheetOnce(name);
  } catch (e) {
    return null;
  }
  return buildSheetResult(name, parsed.cols, parsed.rows);
}

async function fetchSheetOnceDefault() {
  // Pide la hoja "por defecto" del libro (sin indicar nombre), que Google
  // resuelve internamente a la primera pestaña.
  const url = `https://docs.google.com/spreadsheets/d/${FILE_ID}/gviz/tq?tqx=out:json&headers=1&_ts=${Date.now()}`;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  return parseGviz(text);
}

// Detectado en producción: para una pestaña que se está editando en este
// momento (ej. "Julio"), Google a veces se queda "atascado" devolviendo muy
// pocas filas cuando se pide por NOMBRE exacto, aunque la pestaña real tenga
// muchísimas más filas — mientras que pedir la hoja "por defecto" (sin
// nombre) sí trae los datos completos y frescos. Como último recurso,
// probamos esa vía y solo la aceptamos si las fechas que trae realmente
// corresponden al mes que estamos buscando (para no mezclar el mes
// equivocado).
async function fetchSheetAttemptDefaultForMonth(name) {
  let parsed;
  try {
    parsed = await fetchSheetOnceDefault();
  } catch (e) {
    return null;
  }
  const result = buildSheetResult(name, parsed.cols, parsed.rows);
  if (!result) return null;
  const expectedMonthIdx = monthIndexFromName(name);
  if (expectedMonthIdx === -1) return { ...result, viaDefaultFallback: true };
  const fechaHeader = result.headers.find(h => normalize(h) === "fecha") || "Fecha";
  const sample = result.rows.slice(0, 20);
  const withDate = sample.map(r => parseFecha(r[fechaHeader])).filter(Boolean);
  if (withDate.length === 0) return { ...result, viaDefaultFallback: true };
  const matching = withDate.filter(d => d.getMonth() === expectedMonthIdx).length;
  if (matching / withDate.length < 0.5) return null; // las fechas no son de este mes: descartar
  return { ...result, viaDefaultFallback: true };
}

async function fetchSheet(name) {
  // Cuando una pestaña se está editando activamente, Google a veces devuelve
  // una foto vieja/incompleta (por ejemplo 1 fila en vez de más de 100
  // reales) aunque le pidamos datos frescos. Si el primer intento trae muy
  // pocas filas, reintentamos (pocas veces, para no saturar a Google con
  // demasiadas peticiones) y nos quedamos con la versión que trajo MÁS
  // filas — casi siempre es la correcta.
  let best = await fetchSheetAttempt(name);
  const minRowsBeforeRetry = 5;
  const extraAttempts = 1;
  if (!best || best.rawCount < minRowsBeforeRetry) {
    for (let i = 0; i < extraAttempts; i++) {
      await sleep(600);
      const result = await fetchSheetAttempt(name);
      if (result && (!best || result.rawCount > best.rawCount)) {
        best = result;
      }
    }
  }
  // Último recurso: la vía "por defecto", validada contra el mes esperado.
  if (!best || best.rawCount < minRowsBeforeRetry) {
    await sleep(400);
    const fallback = await fetchSheetAttemptDefaultForMonth(name);
    if (fallback && (!best || fallback.rawCount > best.rawCount)) {
      best = fallback;
    }
  }
  return best;
}

async function loadData() {
  try {
    // Google, cuando le pedimos una pestaña que NO existe (por ejemplo
    // "Agosto" antes de que se cree), en vez de dar error nos devuelve
    // silenciosamente los datos de otra pestaña (normalmente la más
    // reciente). Para detectarlo, primero pedimos una pestaña con un nombre
    // inventado: lo que sea que Google nos devuelva ahí es su "relleno" por
    // defecto, y descartamos cualquier mes cuyos datos coincidan con eso.
    const probe = await fetchSheet("__NO_EXISTE__" + Date.now());
    const fallbackFingerprint = probe ? probe.fingerprint : null;

    // Pedimos los meses uno por uno (no en paralelo) para evitar que Google
    // bloquee alguna petición por exceso de peticiones simultáneas.
    const sheets = [];
    for (const m of MONTHS) {
      const s = await fetchSheet(m);
      await sleep(150); // pequeña pausa entre meses para no saturar a Google
      if (!s) continue;
      // Si llegó por la vía "por defecto" ya validamos que sus fechas son de
      // este mes, así que no lo comparamos contra la huella de relleno.
      if (!s.viaDefaultFallback && fallbackFingerprint && s.fingerprint === fallbackFingerprint) {
        continue; // esta pestaña todavía no existe de verdad
      }
      sheets.push(s);
    }
    if (sheets.length === 0) {
      throw new Error('No se pudo leer ninguna hoja. Verifica que el Google Sheet esté compartido como "Cualquiera con el enlace puede ver".');
    }
    processContent(sheets);
  } catch (err) {
    metaLine.textContent = "No se pudieron cargar los datos.";
    showState(`No se pudo leer el Sheet: ${err.message || err}. Verifica el acceso del Sheet y recarga la página.`, true);
  }
}

/* ---------- data aggregation ---------- */

function processContent(sheets) {
  allRows = [];
  const headerSet = [];
  sheets.forEach(s => {
    s.headers.forEach(h => { if (!headerSet.includes(h)) headerSet.push(h); });
    allRows = allRows.concat(s.rows);
  });
  headers = headerSet;
  sheetNames = sheets.map(s => s.name);

  const tecnicoHeader = findHeader(h => normalize(h) === "tecnico") || "Técnico";
  employeeKey = tecnicoHeader;

  employeeMap = new Map();
  allRows.forEach(r => {
    const raw = cleanTecnico(r[employeeKey]);
    if (!raw) return;
    if (!employeeMap.has(raw)) employeeMap.set(raw, []);
    employeeMap.get(raw).push(r);
  });

  metaLine.textContent = "";

  renderEmpty("Escribe un nombre o matrícula y pulsa Buscar para ver su historial.");
}

/* ---------- rendering ---------- */

function showState(html, isError) {
  resultsEl.innerHTML = `<div class="card"><div class="state${isError ? " error" : ""}">${html}</div></div>`;
}

function renderEmpty(msg) { showState(msg, false); }

function scoreClass(n, kind) {
  if (isNaN(n)) return "";
  if (kind === "nps") return n >= 9 ? "good" : n >= 7 ? "mid" : "bad";
  if (kind === "cum") return n >= 95 ? "good" : n >= 85 ? "mid" : "bad";
  return "";
}

function scoreSpan(value, kind) {
  const n = parseNum(value);
  if (isNaN(n)) return `<span>${value || ""}</span>`;
  const cls = scoreClass(n, kind);
  return `<span class="score-${cls || "mid"}">${value}</span>`;
}

/* ---------- reglas de formato/color condicional ---------- */

function stripEuro(v) {
  return (v === null || v === undefined) ? "" : String(v).replace(/€/g, "").trim();
}

function fmt2(v) {
  const n = parseNum(v);
  return isNaN(n) ? (v || "") : n.toFixed(2);
}

function tdAlert(display, isRed) {
  return `<td${isRed ? ' class="cell-alert"' : ""}>${display}</td>`;
}

// Celda de ML-V: 2 decimales, rojo si < 7
function cellMlv(v) {
  if (v === "" || v === undefined) return tdAlert("", false);
  const n = parseNum(v);
  return tdAlert(fmt2(v), !isNaN(n) && n < 7);
}
// Celda de Conv: rojo si < 15%
function cellConv(v) {
  if (v === "" || v === undefined) return tdAlert("", false);
  const n = parseNum(v);
  return tdAlert(v, !isNaN(n) && n < 15);
}
// Celda de %Cum: rojo si < 90%
function cellCum(v) {
  if (v === "" || v === undefined) return tdAlert("", false);
  const n = parseNum(v);
  return tdAlert(v, !isNaN(n) && n < 90);
}
// Celda de %RM: rojo si < 89.5%
function cellPctRm(v) {
  if (v === "" || v === undefined) return tdAlert("", false);
  const n = parseNum(v);
  return tdAlert(v, !isNaN(n) && n < 89.5);
}
// Celda de RM: solo número, sin símbolo de €, sin regla de color
function cellRm(v) {
  return tdAlert(stripEuro(v), false);
}
// Celda de NPS: rojo si no es superior a 9.4
function cellNps(v) {
  if (v === "" || v === undefined) return tdAlert("", false);
  const n = parseNum(v);
  return tdAlert(v, !isNaN(n) && n <= 9.4);
}

function monthIndexFromName(name) {
  const months = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
  const n = normalize(name);
  return months.findIndex(m => n.includes(m));
}

function renderEmployee(rawName) {
  const rows = (employeeMap.get(rawName) || []).slice();
  const fechaHeader = findHeader(h => normalize(h) === "fecha") || "Fecha";
  const npsHeader = findHeader(h => normalize(h) === "nps");
  const cumHeader = findHeader(h => normalize(h).includes("cum") && !normalize(h).includes("incum"));
  const ventasHeader = findHeader(h => normalize(h) === "ventas");
  const incumHeader = findHeader(h => normalize(h) === "incum");

  const codeMatch = rawName.match(/^([A-Za-z0-9\- ]*\d{4,})-(.+)$/);
  const code = codeMatch ? codeMatch[1].trim() : "";
  const name = codeMatch ? codeMatch[2].trim() : rawName;

  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length) : null;
  const numsOf = (arr, header) => arr.map(r => parseNum(r[header])).filter(v => !isNaN(v));

  const groups = new Map();
  rows.forEach(r => {
    const key = r.__sheet || "General";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  });

  // Se listan TODOS los meses cargados en el Sheet, tenga o no datos este empleado ese mes.
  const groupList = sheetNames.map(sheet => {
    const grpRows = groups.get(sheet) || [];
    const dates = grpRows.map(r => parseFecha(r[fechaHeader])).filter(Boolean);
    const minDate = dates.length ? new Date(Math.min(...dates.map(d => d.getTime()))) : null;
    return { sheet, rows: grpRows, minDate, monthIdx: monthIndexFromName(sheet) };
  });

  // Más reciente arriba, más antiguo hacia abajo
  groupList.sort((a, b) => {
    if (a.minDate && b.minDate) return b.minDate - a.minDate;
    if (a.minDate) return -1;
    if (b.minDate) return 1;
    if (a.monthIdx !== -1 && b.monthIdx !== -1) return b.monthIdx - a.monthIdx;
    return b.sheet.localeCompare(a.sheet);
  });

  const allNps = numsOf(rows, npsHeader);
  const allCum = numsOf(rows, cumHeader);
  const allVentas = numsOf(rows, ventasHeader);
  const avgNps = avg(allNps);
  const avgCum = avg(allCum);
  const sumVentas = allVentas.length ? allVentas.reduce((a, b) => a + b, 0) : null;

  const displayCols = headers.filter(h => h !== employeeKey);

  const labHeader = findHeader(h => normalize(h) === "lab");
  const mlvHeader = findHeader(h => normalize(h) === "ml-v");
  const apbHeader = findHeader(h => normalize(h) === "a+b");
  const convHeader = findHeader(h => normalize(h) === "conv");
  const rmHeader = findHeader(h => normalize(h) === "rm");
  const pctRmHeader = findHeader(h => normalize(h) === "%rm");

  const compareCols = [
    { key: labHeader, label: "Lab" },
    { key: mlvHeader, label: "ML-V" },
    { key: apbHeader, label: "A+B" },
    { key: ventasHeader, label: "Ventas" },
    { key: convHeader, label: "Conv" },
    { key: cumHeader, label: "%Cum" },
    { key: incumHeader, label: "Incum" },
    { key: rmHeader, label: "RM" },
    { key: pctRmHeader, label: "%RM" },
    { key: npsHeader, label: "NPS" }
  ];

  const compareRowsHtml = groupList.map(g => {
    if (g.rows.length === 0) {
      const emptyTds = compareCols.map(() => `<td>—</td>`).join("");
      return `<tr style="opacity:.45;"><td><strong>${g.sheet}</strong></td>${emptyTds}</tr>`;
    }
    const sortedRows = g.rows.slice().sort((a, b) => {
      const da = parseFecha(a[fechaHeader]);
      const db = parseFecha(b[fechaHeader]);
      if (!da || !db) return 0;
      return db - da;
    });
    return sortedRows.map(r => {
      const tds = compareCols.map(c => {
        const v = c.key ? (r[c.key] ?? "") : "";
        if (c.label === "ML-V") return cellMlv(v);
        if (c.label === "Conv") return cellConv(v);
        if (c.label === "%Cum") return cellCum(v);
        if (c.label === "%RM") return cellPctRm(v);
        if (c.label === "RM") return cellRm(v);
        if (c.label === "NPS") return cellNps(v);
        return `<td>${v}</td>`;
      }).join("");
      return `<tr><td><strong>${g.sheet}</strong></td>${tds}</tr>`;
    }).join("");
  }).join("");

  const compareTheadCols = compareCols.map(c => `<th>${c.label}</th>`).join("");

  // Resumen: de los meses CON datos, cuántos incumplen cada umbral.
  function isBad(v, threshold, orEqual) {
    const n = parseNum(v);
    if (isNaN(n)) return false;
    return orEqual ? n <= threshold : n < threshold;
  }
  const monthsWithData = groupList.filter(g => g.rows.length > 0);
  const totalEvaluated = monthsWithData.length;
  function evalMonths(headerKey, threshold, orEqual) {
    const bad = [], good = [];
    if (!headerKey) return { count: 0, bad, good };
    monthsWithData.forEach(g => {
      const isBadMonth = g.rows.some(r => isBad(r[headerKey], threshold, orEqual));
      (isBadMonth ? bad : good).push(g.sheet);
    });
    return { count: bad.length, bad, good };
  }
  const alertDefs = [
    { label: "ML-V", ...evalMonths(mlvHeader, 7, false) },
    { label: "Conv", ...evalMonths(convHeader, 15, false) },
    { label: "%Cum", ...evalMonths(cumHeader, 90, false) },
    { label: "%RM", ...evalMonths(pctRmHeader, 89.5, false) },
    { label: "NPS", ...evalMonths(npsHeader, 9.4, true) }
  ];
  const alertItems = alertDefs.map(a => {
    const sections = [];
    sections.push(`<div class="tip-section bad"><div class="tip-label">No cumplen (${a.bad.length}/${totalEvaluated})</div><div class="tip-names">${a.bad.length ? escHtml(a.bad.join(", ")) : "—"}</div></div>`);
    sections.push(`<div class="tip-section good"><div class="tip-label">Cumplen (${a.good.length}/${totalEvaluated})</div><div class="tip-names">${a.good.length ? escHtml(a.good.join(", ")) : "—"}</div></div>`);
    const tooltipHtml = `<div class="tip-title">${escHtml(a.label)}</div>${sections.join("")}`;
    const tipId = attachTip(tooltipHtml);
    return `
    <div class="alert-chip${a.count > 0 ? " bad" : ""}" data-tip-id="${tipId}">
      <div class="av">${a.count}/${totalEvaluated}</div>
      <div class="al">${a.label}</div>
    </div>
  `;
  }).join("");
  const alertSummary = totalEvaluated > 0
    ? `<div class="section-label" style="margin-top:16px;">Resumen de alertas · pasa el cursor sobre cada KPI para ver los meses</div><div class="alert-grid">${alertItems}</div>`
    : "";

  const monthSections = groupList.filter(g => g.rows.length > 0).map(g => {
    const sorted = g.rows.slice().sort((a, b) => {
      const da = parseFecha(a[fechaHeader]);
      const db = parseFecha(b[fechaHeader]);
      if (!da || !db) return 0;
      return db - da;
    });
    const tbody = sorted.map(r => {
      const tds = displayCols.map(h => {
        const v = r[h] ?? "";
        if (h === mlvHeader) return cellMlv(v);
        if (h === convHeader) return cellConv(v);
        if (h === cumHeader) return cellCum(v);
        if (h === pctRmHeader) return cellPctRm(v);
        if (h === rmHeader) return cellRm(v);
        if (h === npsHeader) return cellNps(v);
        return `<td>${v}</td>`;
      }).join("");
      return `<tr>${tds}</tr>`;
    }).join("");
    const thead = displayCols.map(h => `<th>${h}</th>`).join("");
    return `
      <div class="card month-section">
        <div class="month-title">${g.sheet}</div>
        <div class="month-sub">${g.rows.length} registro${g.rows.length === 1 ? "" : "s"}</div>
        <div class="table-scroll">
          <table>
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join("");

  const backButtonHtml = backAction ? `<button id="backBtn" class="secondary back-btn" type="button">← Volver</button>` : "";

  resultsEl.innerHTML = `
    ${backButtonHtml}
    <div class="card">
      <div class="employee-header">
        <div>
          <div class="employee-name">${name}</div>
          <div class="employee-code">${code || rawName}</div>
        </div>
        <div class="employee-code">${rows.length} registro${rows.length === 1 ? "" : "s"} en ${groupList.length} mes${groupList.length === 1 ? "" : "es"}</div>
      </div>
      ${alertSummary}
      <div class="section-label" style="margin-top:16px;">Comparativa mensual · más reciente arriba</div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Mes</th>${compareTheadCols}</tr></thead>
          <tbody>${compareRowsHtml}</tbody>
        </table>
      </div>
    </div>

    ${monthSections}
  `;

  if (backAction) {
    const btn = document.getElementById("backBtn");
    if (btn) {
      btn.addEventListener("click", () => {
        const fn = backAction;
        backAction = null;
        if (fn) fn();
      });
    }
  }
}

function renderChips(matches, query) {
  const shown = matches.slice(0, 30);
  const chips = shown.map(m => `<div class="chip" data-name="${m.replace(/"/g, "&quot;")}">${m}</div>`).join("");
  const extra = matches.length > 30 ? `<div class="hint">Y ${matches.length - 30} más — sé más específico para acotar la búsqueda.</div>` : "";
  resultsEl.innerHTML = `
    <div class="card">
      <div class="state">Encontré ${matches.length} empleados que coinciden con "${query}". Elige uno:</div>
      <div class="chip-list">${chips}</div>
      ${extra}
    </div>
  `;
  resultsEl.querySelectorAll(".chip").forEach(c => {
    c.addEventListener("click", () => {
      backAction = () => renderChips(matches, query);
      searchBox.value = c.getAttribute("data-name");
      renderEmployee(c.getAttribute("data-name"));
    });
  });
}

function doSearch() {
  backAction = null;
  const query = searchBox.value.trim();
  if (!query) { renderEmpty("Escribe un nombre o matrícula y pulsa Buscar para ver su historial."); return; }
  if (employeeMap.size === 0) { renderEmpty("Todavía no hay datos cargados desde el Sheet."); return; }

  const nq = normalize(query);
  const allNames = Array.from(employeeMap.keys());
  const exact = allNames.find(n => normalize(n) === nq);
  if (exact) { renderEmployee(exact); return; }

  const matches = allNames.filter(n => normalize(n).includes(nq));
  if (matches.length === 0) {
    renderEmpty(`No hay datos en la búsqueda para "${query}".`);
  } else if (matches.length === 1) {
    renderEmployee(matches[0]);
  } else {
    renderChips(matches, query);
  }
}

/* ---------- buscador por jerarquía ---------- */

function buildHierarchySelect() {
  const sel = document.getElementById("hierarchySelect");
  if (!sel) return;

  // Solo los responsables (jefes técnicos) aparecen aquí. Para buscar un técnico
  // concreto se usa el buscador principal de arriba.
  const leaders = HIERARCHY_DATA.filter(d => d.nivel === "4 JDE");
  leaders.sort((a, b) => a.tecnico.localeCompare(b.tecnico));

  leaders.forEach(leader => {
    const memberCount = HIERARCHY_DATA.filter(d => d.jde === leader.matricula && d.matricula !== leader.matricula).length;
    const opt = document.createElement("option");
    opt.value = `TEAM:${leader.matricula}`;
    opt.textContent = `${leader.tecnico} (${leader.matricula}) · ${memberCount} técnico${memberCount === 1 ? "" : "s"}`;
    sel.appendChild(opt);
  });
}

function searchByCode(code) {
  if (!code) return;
  const nq = normalize(code);
  const allNames = Array.from(employeeMap.keys());
  const matches = allNames.filter(n => normalize(n).includes(nq));
  searchBox.value = code;
  if (matches.length === 0) {
    renderEmpty(`Este técnico (código ${code}) todavía no tiene registros de resultados cargados en el Sheet.`);
  } else if (matches.length === 1) {
    renderEmployee(matches[0]);
  } else {
    renderChips(matches, code);
  }
}

/* ---------- vista de grupo (por responsable o por provincia) ---------- */

let currentGroup = null; // { members, monthsAsc, selectedMonths: Set } — el período (Desde/Hasta) se traduce a selectedMonths

function sortedMonthsDesc() {
  return sheetNames.slice().sort((a, b) => monthIndexFromName(b) - monthIndexFromName(a));
}

function sortedMonthsAsc() {
  return sheetNames.slice().sort((a, b) => monthIndexFromName(a) - monthIndexFromName(b));
}

function findEmployeeRowsByCode(code) {
  const nq = normalize(code);
  const allNames = Array.from(employeeMap.keys());
  const match = allNames.find(n => normalize(n).includes(nq));
  return match ? employeeMap.get(match) : null;
}

function buildProvinceSelect() {
  const sel = document.getElementById("provinceSelect");
  if (!sel) return;

  const tecnicos = HIERARCHY_DATA.filter(d => d.nivel === "5 TEC" && d.provincia);
  const byProvincia = new Map();
  tecnicos.forEach(d => {
    const key = d.provincia.trim();
    if (!byProvincia.has(key)) byProvincia.set(key, []);
    byProvincia.get(key).push(d);
  });

  const provincias = Array.from(byProvincia.keys()).sort((a, b) => a.localeCompare(b));
  provincias.forEach(prov => {
    const opt = document.createElement("option");
    opt.value = prov;
    const count = byProvincia.get(prov).length;
    opt.textContent = `${titleCase(prov)} · ${count} técnico${count === 1 ? "" : "s"}`;
    sel.appendChild(opt);
  });
}

function titleCase(s) {
  return s.toLowerCase().replace(/(^|\s)\p{L}/gu, c => c.toUpperCase());
}

let selectedLeaderCode = "";
let selectedProvincia = "";

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

let tipData = {};
let tipCounter = 0;
function attachTip(html) {
  const id = "tip" + (tipCounter++);
  tipData[id] = html;
  return id;
}
function positionTip(x, y) {
  const box = document.getElementById("tipBox");
  if (!box) return;
  const pad = 14;
  let left = x + pad;
  let top = y + pad;
  const rect = box.getBoundingClientRect();
  if (left + rect.width > window.innerWidth - 8) left = Math.max(8, x - rect.width - pad);
  if (top + rect.height > window.innerHeight - 8) top = Math.max(8, y - rect.height - pad);
  box.style.left = left + "px";
  box.style.top = top + "px";
}
function showTip(id, x, y) {
  const box = document.getElementById("tipBox");
  if (!box || !tipData[id]) return;
  box.innerHTML = tipData[id];
  box.style.display = "block";
  positionTip(x, y);
}
function hideTip() {
  const box = document.getElementById("tipBox");
  if (box) box.style.display = "none";
}
document.addEventListener("mouseover", e => {
  const el = e.target.closest("[data-tip-id]");
  if (el) showTip(el.getAttribute("data-tip-id"), e.clientX, e.clientY);
});
document.addEventListener("mousemove", e => {
  const el = e.target.closest("[data-tip-id]");
  if (el) positionTip(e.clientX, e.clientY);
});
document.addEventListener("mouseout", e => {
  const el = e.target.closest("[data-tip-id]");
  if (el) hideTip();
});

function computeCombinedMembers(leaderCode, provincia) {
  let members = leaderCode
    ? HIERARCHY_DATA.filter(d => d.jde === leaderCode && d.matricula !== leaderCode)
    : HIERARCHY_DATA.filter(d => d.nivel === "5 TEC");
  if (provincia) {
    members = members.filter(d => d.provincia && d.provincia.trim() === provincia);
  }
  if (onlyCuenta) {
    members = members.filter(d => cuentaEFor(d) !== "No");
  }
  return members;
}

function renderCombined() {
  if (!selectedLeaderCode && !selectedProvincia) {
    renderEmpty("Elige un responsable y/o una provincia para ver el grupo.");
    return;
  }
  const leader = selectedLeaderCode ? HIERARCHY_DATA.find(d => d.nivel === "4 JDE" && d.matricula === selectedLeaderCode) : null;
  if (selectedLeaderCode && !leader) { renderEmpty("No encontré este responsable."); return; }

  const members = computeCombinedMembers(selectedLeaderCode, selectedProvincia);

  let title, subtitle;
  if (leader && selectedProvincia) {
    title = `${leader.tecnico} · ${titleCase(selectedProvincia)}`;
    subtitle = `${leader.matricula} · Responsable + provincia`;
  } else if (leader) {
    title = leader.tecnico;
    subtitle = `${leader.matricula} · Responsable de equipo`;
  } else {
    title = titleCase(selectedProvincia);
    subtitle = "Provincia (todos los responsables)";
  }

  if (members.length === 0) {
    renderEmpty(`No hay técnicos que combinen ese responsable y esa provincia.`);
    return;
  }

  renderGroup(title, subtitle, members);
}

function leaderNameFor(jdeCode) {
  const leader = HIERARCHY_DATA.find(d => d.nivel === "4 JDE" && d.matricula === jdeCode);
  return leader ? leader.tecnico : "—";
}

function renderGroup(title, subtitle, members) {
  if (employeeMap.size === 0) {
    renderEmpty("Todavía no hay datos cargados desde el Sheet.");
    return;
  }

  const monthsAsc = sortedMonthsAsc();
  const fromDefault = monthsAsc[0] || "";
  const toDefault = monthsAsc[monthsAsc.length - 1] || "";
  currentGroup = { members, monthsAsc, selectedMonths: new Set(monthsAsc) };

  const monthOptions = monthsAsc.map(m => `<option value="${m}">${m}</option>`).join("");

  const backButtonHtml = backAction ? `<button id="backBtn" class="secondary back-btn" type="button">← Volver</button>` : "";

  const sortedMembers = members.slice().sort((a, b) => a.tecnico.localeCompare(b.tecnico));
  const memberRows = sortedMembers.map(m => {
    const cuenta = cuentaEFor(m);
    const cuentaBadge = cuenta === "Si" ? `<span class="cuenta-badge si">Cuenta</span>`
      : cuenta === "No" ? `<span class="cuenta-badge no">No cuenta</span>`
      : `<span class="cuenta-badge unk">—</span>`;
    return `
    <tr class="member-row" data-code="${m.matricula}">
      <td>${m.matricula || "—"}</td>
      <td>${m.tecnico}</td>
      <td>${leaderNameFor(m.jde)}</td>
      <td>${cuentaBadge}</td>
    </tr>
  `;
  }).join("");

  resultsEl.innerHTML = `
    ${backButtonHtml}
    <div class="card">
      <div class="employee-header">
        <div>
          <div class="employee-name">${title}</div>
          <div class="employee-code">${subtitle}</div>
        </div>
        <div class="employee-code">${members.length} técnico${members.length === 1 ? "" : "s"} en el grupo</div>
      </div>
      <div class="section-label" style="margin-top:16px;">Periodo a evaluar</div>
      <div class="period-row">
        <select id="groupFromMonth" class="period-select">${monthOptions}</select>
        <span class="period-sep">→</span>
        <select id="groupToMonth" class="period-select">${monthOptions}</select>
      </div>
      <div class="section-label" style="margin-top:16px;" id="groupStatsLabel"></div>
      <div class="alert-grid" id="groupStatsGrid"></div>
      <div class="section-label" style="margin-top:16px;">Técnicos del grupo · clic para ver su historial</div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Código</th><th>Técnico</th><th>Jefe técnico</th><th>Cuenta E</th></tr></thead>
          <tbody>${memberRows}</tbody>
        </table>
      </div>
    </div>
  `;

  if (backAction) {
    const btn = document.getElementById("backBtn");
    if (btn) {
      btn.addEventListener("click", () => {
        const fn = backAction;
        backAction = null;
        if (fn) fn();
      });
    }
  }

  const fromSel = document.getElementById("groupFromMonth");
  const toSel = document.getElementById("groupToMonth");
  fromSel.value = fromDefault;
  toSel.value = toDefault;

  function onPeriodChange() {
    const fromIdx = monthIndexFromName(fromSel.value);
    const toIdx = monthIndexFromName(toSel.value);
    const lo = Math.min(fromIdx, toIdx);
    const hi = Math.max(fromIdx, toIdx);
    currentGroup.selectedMonths = new Set(currentGroup.monthsAsc.filter(m => {
      const idx = monthIndexFromName(m);
      return idx >= lo && idx <= hi;
    }));
    updateGroupStats();
  }
  fromSel.addEventListener("change", onPeriodChange);
  toSel.addEventListener("change", onPeriodChange);

  document.querySelectorAll(".member-row").forEach(row => {
    row.style.cursor = "pointer";
    row.addEventListener("click", () => {
      const code = row.getAttribute("data-code");
      if (!code) return;
      backAction = () => {
        renderGroup(title, subtitle, members);
        const f = document.getElementById("groupFromMonth");
        const t = document.getElementById("groupToMonth");
        if (f) f.value = fromSel.value;
        if (t) t.value = toSel.value;
        if (f && t) {
          const evt = new Event("change");
          f.dispatchEvent(evt);
        }
      };
      searchByCode(code);
    });
  });

  updateGroupStats();
}

function updateGroupStats() {
  if (!currentGroup) return;
  const { members, selectedMonths } = currentGroup;
  const months = Array.from(selectedMonths);
  const total = members.length;

  const mlvHeader = findHeader(h => normalize(h) === "ml-v");
  const convHeader = findHeader(h => normalize(h) === "conv");
  const cumHeader = findHeader(h => normalize(h).includes("cum") && !normalize(h).includes("incum"));
  const pctRmHeader = findHeader(h => normalize(h) === "%rm");
  const npsHeader = findHeader(h => normalize(h) === "nps");

  const kpiDefs = [
    { label: "ML-V", header: mlvHeader, threshold: 7, orEqual: false },
    { label: "Conv", header: convHeader, threshold: 15, orEqual: false },
    { label: "%Cum", header: cumHeader, threshold: 90, orEqual: false },
    { label: "%RM", header: pctRmHeader, threshold: 89.5, orEqual: false },
    { label: "NPS", header: npsHeader, threshold: 9.4, orEqual: true }
  ];
  const results = kpiDefs.map(k => ({ ...k, pass: [], fail: [], noData: [] }));

  let withData = 0;
  members.forEach(m => {
    const rows = findEmployeeRowsByCode(m.matricula) || [];
    const monthRows = rows.filter(r => months.includes(r.__sheet));
    const hasData = monthRows.length > 0;
    if (hasData) withData++;
    results.forEach(k => {
      if (!hasData) { k.noData.push(m.tecnico); return; }
      // Cumple si NINGUNO de sus registros en el período incumple el umbral.
      const bad = monthRows.some(r => isBad(r[k.header], k.threshold, k.orEqual));
      if (bad) k.fail.push(m.tecnico); else k.pass.push(m.tecnico);
    });
  });

  const grid = results.map(k => {
    const sections = [];
    sections.push(`<div class="tip-section good"><div class="tip-label">Cumplen (${k.pass.length}/${total})</div><div class="tip-names">${k.pass.length ? escHtml(k.pass.join(", ")) : "—"}</div></div>`);
    sections.push(`<div class="tip-section bad"><div class="tip-label">No cumplen (${k.fail.length}/${total})</div><div class="tip-names">${k.fail.length ? escHtml(k.fail.join(", ")) : "—"}</div></div>`);
    if (k.noData.length) {
      sections.push(`<div class="tip-section muted"><div class="tip-label">Sin datos (${k.noData.length}/${total})</div><div class="tip-names">${escHtml(k.noData.join(", "))}</div></div>`);
    }
    const tooltipHtml = `<div class="tip-title">${escHtml(k.label)}</div>${sections.join("")}`;
    const tipId = attachTip(tooltipHtml);
    return `
      <div class="alert-chip${k.pass.length < total ? " bad" : ""}" data-tip-id="${tipId}">
        <div class="av">${k.pass.length}/${total}</div>
        <div class="al">${k.label}</div>
      </div>
    `;
  }).join("");

  const monthsSorted = months.slice().sort((a, b) => monthIndexFromName(a) - monthIndexFromName(b));
  const periodLabel = monthsSorted.length === 0 ? "sin meses"
    : monthsSorted.length === 1 ? monthsSorted[0]
    : `${monthsSorted[0]} → ${monthsSorted[monthsSorted.length - 1]}`;
  document.getElementById("groupStatsLabel").textContent = `Cumplimiento del grupo · ${periodLabel} (${withData}/${total} con datos en el período) · pasa el cursor sobre cada KPI para ver los nombres`;
  document.getElementById("groupStatsGrid").innerHTML = grid;
}

document.getElementById("hierarchySelect").addEventListener("change", e => {
  backAction = null;
  const val = e.target.value;
  selectedLeaderCode = val.startsWith("TEAM:") ? val.slice(5) : "";

});

document.getElementById("provinceSelect").addEventListener("change", e => {

});

function updateCuentaToggleLabel() {
  const btn = document.getElementById("cuentaToggleBtn");
  if (!btn) return;
  btn.textContent = onlyCuenta
    ? `Mostrando solo los que cuentan en la factura · toca para incluir a todos`

}

document.getElementById("cuentaToggleBtn").addEventListener("click", () => {
  backAction = null;
  onlyCuenta = !onlyCuenta;
  updateCuentaToggleLabel();
  renderCombined();
});

searchBox.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
document.getElementById("searchBtn").addEventListener("click", doSearch);
document.getElementById("clearBtn").addEventListener("click", () => {
  backAction = null;
  searchBox.value = "";
  document.getElementById("hierarchySelect").value = "";
  document.getElementById("provinceSelect").value = "";
  selectedLeaderCode = "";
  selectedProvincia = "";

});

function setTodayDate() {
  const el = document.getElementById("todayDate");
  if (el) {
    const txt = new Date().toLocaleDateString("es-ES", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    el.textContent = txt;
  }
  const timeEl = document.getElementById("todayTime");
  if (timeEl) {
    const timeTxt = new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
    timeEl.textContent = timeTxt;
  }
  const locEl = document.getElementById("todayLocation");
  if (locEl) {
    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
      const parts = tz.split("/");
      const city = (parts[parts.length - 1] || tz).replace(/_/g, " ");
      locEl.textContent = city ? `📍 ${city}` : "";
    } catch (e) {
      locEl.textContent = "";
    }
  }
}

window.addEventListener("DOMContentLoaded", () => {
  setTodayDate();
  setInterval(setTodayDate, 30000);
  buildHierarchySelect();
  buildProvinceSelect();
  // Algunos navegadores restauran la última opción elegida en un <select> al
  // recargar la página, pero sin disparar el evento "change". Forzamos que
  // ambos buscadores arranquen vacíos para que coincidan con el estado real.
  document.getElementById("hierarchySelect").value = "";
  document.getElementById("provinceSelect").value = "";
  selectedLeaderCode = "";
  selectedProvincia = "";
  onlyCuenta = false;
  updateCuentaToggleLabel();
  fetchCuentaEData(); // en paralelo, no bloquea la carga principal
  loadData();
});
</script>
</body>
